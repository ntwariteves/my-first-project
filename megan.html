<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3dimension</title>
</head>
<body>
    <script>
let arr=[12,5,9,21,7,33,15,90]
let largest=arr[0]
for(let i=0;i<arr.length;i++){
    if(arr[i]>largest){
        largest=arr[i];
    }
}
document.write("The largest element is:"+largest);
    </script>
</body>
</html>
