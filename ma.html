<template>
  <div class="container">
    <div class="form-card">
      <h2>Student Registration Form</h2>

      <form @submit.prevent="submitForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" v-model="student.name" required />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" v-model="student.email" required />
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" v-model="student.phone" required />
        </div>

        <div class="form-group">
          <label>Gender</label>
          <select v-model="student.gender" required>
            <option disabled value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>
        </div>

        <div class="form-group">
          <label>Course</label>
          <input type="text" v-model="student.course" required />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" v-model="student.password" required />
        </div>

        <button type="submit">Register</button>
      </form>

      <div v-if="submitted" class="success-message">
        Student Registered Successfully!
      </div>
    </div>
  </div>
</template>

<script>
export default {
  name: "StudentRegistration",
  data() {
    return {
      submitted: false,
      student: {
        name: "",
        email: "",
        phone: "",
        gender: "",
        course: "",
        password: "",
      },
    };
  },
  methods: {
    submitForm() {
      console.log("Student Data:", this.student);
      this.submitted = true;

      // Reset form
      this.student = {
        name: "",
        email: "",
        phone: "",
        gender: "",
        course: "",
        password: "",
      };
    },
  },
};
</script>

<style scoped>
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #f4f6f9;
}

.form-card {
  background: white;
  padding: 30px;
  width: 400px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #333;
}

.form-group {
  margin-bottom: 15px;
}

label {
  display: block;
  margin-bottom: 6px;
  font-weight: bold;
}

input,
select {
  width: 100%;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 12px;
  background: #42b983;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #369870;
}

.success-message {
  margin-top: 15px;
  text-align: center;
  color: green;
  font-weight: bold;
}
</style>
